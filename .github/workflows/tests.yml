name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_ENV: testing
  APP_KEY: base64:2fl+KtvkdphvQdrlYFiOU4aKp75xMnrbeUIeBIq/9jo=

jobs:
  test-sqlite:
    name: PHPUnit (SQLite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3, gd, zip, xml, curl, openssl, intl
          coverage: none

      - name: Prepare test environment
        run: cp .env.testing .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Run tests (SQLite, default suite)
        run: php artisan test --exclude-group=agent

      - name: Run tests (SQLite, agent suite)
        run: php artisan test --group=agent

  test-pgsql:
    name: PHPUnit (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linha_leve_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo_pgsql, pgsql, gd, zip, xml, curl, openssl, intl
          coverage: none

      - name: Prepare test environment
        run: cp .env.testing .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Run tests (PostgreSQL, default suite)
        run: php -d memory_limit=2048M vendor/phpunit/phpunit/phpunit --configuration=phpunit.pgsql.xml --exclude-group agent

      - name: Run tests (PostgreSQL, agent suite)
        run: php -d memory_limit=2048M vendor/phpunit/phpunit/phpunit --configuration=phpunit.pgsql.xml --group agent
